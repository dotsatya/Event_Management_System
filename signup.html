<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <title>Event Management : Login Page</title>
  <link rel="stylesheet" href="login.css">
</head>

<body>


  <header>
    <div class="name_side">
      <h2 class="logo">
        Event Management System
      </h2>

      <nav class="navigation">
        <a href="Management_Team.html">Management Team<span></span></a>
        <a href="#">About<span></span></a>
        <a href="#">Contact<span></span></a>
        <button class="btnLogin-popup" onclick="window.open('login.html')">
          Log In</button>
      </nav>
    </div>


    <div class="login_side">
      <div class="content login">
        <form method="post">
          <h2>Sign Up</h2>

          <!-- <div class="input-box">
            <span class="icon"><i class="bi bi-person-fill"></i></span>
            <input type="text" name="user_name" required>
            <label for="name">User ID</label>
          </div> -->

          <div class="dropdown">
            <div class="input-b">
              <span class="selected-text"></span>
            </div>
            <div class="list">
              <input type="radio" name="drop1" id="id11" class="radio" />
              <label for="id11">
                <span class="name">Admin</span>
              </label>

              <input type="radio" name="drop1" id="id12" class="radio" />
              <label for="id12">
                <span class="name">User</span>
              </label>
              </label>

              <input type="radio" name="drop1" id="id13" class="radio" />
              <label for="id13">
                <span class="name">Bussiness</span>
              </label>

            </div>
          </div>

          <div class="input-box">
            <span class="icon"><img src="images/name.png" height="20"></span>
            <input type="text" name="user_name" required>
            <label for="name">Name</label>
          </div>

          <div class="input-box">
            <span class="icon"><ion-icon name="mail"></ion-icon></span>

            <input type="email" name="user_email" required>
            <label for="email">Email</label>
          </div>

          <div class="input-box">
            <span class="icon"><ion-icon name="lock-closed"></ion-icon></span>

            <input type="password" name="user_password" required>
            <label for="password">Enter Password</label>
          </div>

          <div class="input-box">
            <span class="icon"><ion-icon name="lock-closed"></ion-icon></span>

            <input type="password" name="user_re_password" required>
            <label for="re-password">Enter Re-Password</label>
          </div>

          <div class="check">
            <input type="checkbox" name="" id=""><span>Remember me</span>
          </div>

          <input type="submit" value="Log In" class="submit">


          <p>You have an account --><a href="login.html" class="register-link">Log In</a></p>


        </form>
      </div>
    </div>

  </header>


  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

  <script src="script.js"></script>
</body>

</html>
