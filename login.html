<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <title>Event Management : Login Page</title>
  <link rel="stylesheet" href="login.css">
</head>

<body>


  <header>
    <div class="name_side">
      <h2 class="logo">
        Event  Management  System
      </h2>

      <nav class="navigation">
        <a href="#">Management Team<span></span></a>
        <a href="#">About<span></span></a>
        <a href="#">Contact<span></span></a>
        <button class="btnLogin-popup" onclick="window.open('login.html')">
          Log In</button>
      </nav>
    </div>


    <div class="login_side">
      <div class="content login">
        <form method="post">
          <h2>Log In</h2>

          <div class="input-box">
            <span class="icon"><ion-icon name="mail"></ion-icon></span>
            <input type="email" name="user_email" required>
            <label for="email">Email</label>
          </div>


          <div class="input-box">
            <span class="icon"><ion-icon name="lock-closed"></ion-icon></span>

            <input type="password" name="user_password" required>
            <label for="password">Password</label>
          </div>

          <div class="check">
            <input type="checkbox" name="" id=""><span>Remember me</span>
             <a href="pass_recovery.html">Forget Password?</a>
          </div>

          <input type="submit" value="Log In" class="submit">


          <p>Don't have an account?<a href="signup.html" class="register-link">Sign Up</a></p>


        </form>
      </div>
    </div>

    <div class="right_box">
      <h3>Incorrect Password</h3>
    </div>

  </header>


  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

  <script src="script.js"></script>
</body>

</html>
