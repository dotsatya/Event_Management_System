<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <title>Event Management : Password Recovery</title>
  <link rel="stylesheet" href="login.css">
</head>

<body>


  <header>
    <div class="name_side">
      <h2 class="logo">
        Event  Management  System
      </h2>

      <nav class="navigation">
        <a href="Management_Team.html">Management Team<span></span></a>
        <a href="upcoming_events.html">Upcoming Events<span></span></a>
        <a href="#">About<span></span></a>
        <a href="#">Contact<span></span></a>
        <!-- <button class="btnLogin-popup">
          Log In</button> -->
      </nav>
    </div>


    <div class="login_side">
      <div class="content login">
        <form method="post">
          <h2> Pass Recovery</h2>

          <div class="input-box">
            <span class="icon"><ion-icon name="mail"></ion-icon></span>
            <input type="email" name="user_email" required>
            <label for="email">Email</label>
          </div>
          
          <div class="input-box">
            <span class="icon"><ion-icon name="mail"></ion-icon></span>
            <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="6" autocomplete="one-time-code" required>
            <label for="email">Enter OTP</label>
          </div>

          <div class="input-box">
            <span class="icon"><ion-icon name="lock-closed"></ion-icon></span>

            <input type="password" name="user_password" required>
            <label for="password">Enter New Password</label>
          </div>

          <div class="check">
            <input type="checkbox" name="" id=""><span>Remember me</span>
          </div>

          <input type="submit" value="Log In" class="submit">


          <p>Don't have an account?<a href="signup.html" class="register-link">Sign Up</a></p>


        </form>
      </div>
    </div>


  </header>


  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

  <script src="script.js"></script>
</body>

</html>
